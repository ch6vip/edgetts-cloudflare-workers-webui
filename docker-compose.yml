services:
  cf-tts:
    build: .
    ports:
      - "3000:3000"
    environment:
      - API_KEY=your-api-key-here
      - PORT=3000
      - DATA_DIR=/data/kv
      - LOG_LEVEL=info
    volumes:
      - tts_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  tts_data:
